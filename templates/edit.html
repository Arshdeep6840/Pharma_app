{% extends 'layout.html' %}
{% block content %}

<div class="glass-card">
    <h4>Edit Medicine</h4>

    <form method="POST">

        <input name="name" value="{{data[1]}}" class="form-control mb-2">
        <input name="company" value="{{data[2]}}" class="form-control mb-2">
        <input name="price" value="{{data[3]}}" class="form-control mb-2">
        <input name="quantity" value="{{data[4]}}" class="form-control mb-2">
        <input name="expiry" type="date" value="{{data[5]}}" class="form-control mb-2">

        <button class="btn btn-primary">Update</button>
    </form>
</div>

{% endblock %}
